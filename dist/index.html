    <script>
      // 在应用挂载前同步 dark 类，避免刷新后首屏错位
      (function(){
        try{
          var isDark = (localStorage.getItem('theme') || '') === 'dark'
          var html = document.documentElement
          html.classList.toggle('dark', !!isDark)
        }catch(e){}
      })()
    </script>
